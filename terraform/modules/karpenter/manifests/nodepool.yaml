apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        role: app
    spec:
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: default

      # Taints and requirements
      requirements:
        # Only use these instance types — cheap options for dev
        - key: "node.kubernetes.io/instance-type"
          operator: In
          values: ["t3.medium", "t3.large", "t3a.medium", "t3a.large"]

        # Only launch in your two AZs
        - key: "topology.kubernetes.io/zone"
          operator: In
          values: ["ap-south-1a", "ap-south-1b"]

        # Use on-demand for now — change to spot later in prod
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]

        # Only linux nodes
        - key: "kubernetes.io/os"
          operator: In
          values: ["linux"]

  # Karpenter will terminate idle nodes after 30 seconds — good for dev to save cost
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s

  # Hard limit — Karpenter will never scale beyond this
  limits:
    cpu: "4"
    memory: 8Gi